run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - goimports
    - gofumpt

linters-settings:
  goimports:
    local-prefixes: github.com/datamaker-kr/synapse-cli
  gofumpt:
    extra-rules: true

issues:
  exclude-dirs:
    - internal/client/generated

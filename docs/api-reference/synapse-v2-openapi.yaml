                            message:
                              type: string
                        nullable: true
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        example: req_abc123def456
          description: Validation Error
        '401':
          description: Authentication Required
        '403':
          description: Permission Denied
        '404':
          description: Not Found

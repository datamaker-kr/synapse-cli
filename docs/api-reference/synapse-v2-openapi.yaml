openapi: 3.0.3
info:
  title: Synapse API v2
  version: 2.0.0
  description: CLI-optimized API for Synapse ML Platform
paths:
  /v2/assignments/:
    get:
      operationId: assignment_list
      description: 할당작업 목록을 커서 기반 페이지네이션으로 조회합니다. 할당작업은 태스크에 속하며, task 필터로 특정 태스크의
        할당 내역을 조회할 수 있습니다.
      summary: 할당작업 목록 조회
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: is_confirmed
        schema:
          type: boolean
      - in: query
        name: is_discarded
        schema:
          type: boolean
      - name: per_page
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: status_label
        schema:
          type: string
          x-spec-enum-id: faa0b86cc58066f8
          title: Label Status
          enum:
          - completed
          - in_progress
          - skipped
          - stand_by
        description: |-
          * `stand_by` - Stand By
          * `in_progress` - In Progress
          * `completed` - Completed
          * `skipped` - Skipped
      - in: query
        name: status_review
        schema:
          type: string
          x-spec-enum-id: 8c37626ae0839f71
          title: Review Status
          enum:
          - completed
          - in_progress
          - rejected
          - skipped
          - stand_by
        description: |-
          * `stand_by` - Stand By
          * `in_progress` - In Progress
          * `rejected` - Rejected
          * `completed` - Completed
          * `skipped` - Skipped
      - in: query
        name: task
        schema:
          type: integer
      tags:
      - Assignments
      security:
      - tokenAuth: []
        SYNAPSE-Tenant: []
      - TokenAuth: []
        SYNAPSE-Tenant: []
      - AccessTokenAuth: []
        SYNAPSE-Tenant: []
      - SYNAPSE-Tenant: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssignmentV2ListList'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          properties:
                            field:
                              type: string
                            message:
                              type: string
                        nullable: true
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        example: req_abc123def456
          description: Validation Error
        '401':
          description: Authentication Required
        '403':
          description: Permission Denied
        '404':
          description: Not Found
  /v2/assignments/{id}/:
    get:
      operationId: assignment_retrieve
      description: |-
        할당작업 조회.

        어노테이션 태스크에 배정된 작업자별 할당 내역을 조회합니다.
        라벨링 상태, 검수 상태, 확정 여부 등으로 필터링할 수 있습니다.
      summary: 할당작업 상세 조회
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Assignment.
        required: true
      tags:
      - Assignments
      security:
      - tokenAuth: []
        SYNAPSE-Tenant: []
      - TokenAuth: []
        SYNAPSE-Tenant: []
      - AccessTokenAuth: []
        SYNAPSE-Tenant: []
      - SYNAPSE-Tenant: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentV2Detail'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          properties:
                            field:
                              type: string
                            message:
                              type: string
                        nullable: true
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        example: req_abc123def456
          description: Validation Error
        '401':
          description: Authentication Required
        '403':
          description: Permission Denied
        '404':
          description: Not Found
  /v2/assignments/{id}/check_permission/:
    get:
      operationId: assignment_check_permission
      description: |-
        Derived Model에 대한 사용자의 접근 권한을 확인합니다.

        부모 Target Model의 권한을 기반으로 검증하며, 사용자가 해당 파생 리소스에 접근할 수 있는 권한이 있는지 확인합니다.
      summary: 권한 확인 (파생)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Assignment.
        required: true
      tags:
      - Assignments
      security:
      - tokenAuth: []
        SYNAPSE-Tenant: []
      - TokenAuth: []
        SYNAPSE-Tenant: []
      - AccessTokenAuth: []
        SYNAPSE-Tenant: []
      - SYNAPSE-Tenant: []
      responses:
        '200':
          description: 접근 권한 있음
        '403':
          description: 접근 권한 없음
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          properties:
                            field:
                              type: string
                            message:
                              type: string
                        nullable: true
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        example: req_abc123def456
          description: Validation Error
        '401':
          description: Authentication Required
        '404':
          description: Not Found
  /v2/assignments/{id}/permissions/:
    get:
      operationId: assignment_permissions
      description: Derived Model에 대한 현재 사용자의 상세 권한 정보를 반환합니다. 부모 Target Model의 권한을
        기반으로 합니다.
      summary: 사용자 권한 상세 정보 (파생)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Assignment.
        required: true
      tags:
      - Assignments
      security:
      - tokenAuth: []
        SYNAPSE-Tenant: []
      - TokenAuth: []
        SYNAPSE-Tenant: []
      - AccessTokenAuth: []
        SYNAPSE-Tenant: []
      - SYNAPSE-Tenant: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                파생권한정보:
                  value:
                    user_id: 1
                    has_access: true
                    access_via: derived
                    parent_model: project
                    parent_id: 123
                    parent_name: My Project
                    user_role: leader
                    permissions:
                    - workshop.read
                    - workshop.write
                    can_invite: false
                    is_derived: true
                  summary: 파생 권한 정보
                PUBLIC접근:
                  value:
                    user_id: 1
                    has_access: true
                    access_via: derived
                    parent_model: project
                    parent_id: 123
                    parent_name: My Project
                    user_role: null
                    permissions: []
                    can_invite: false
                    is_derived: true
                  summary: PUBLIC 접근
          description: 파생 모델의 사용자 권한 정보
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          properties:
                            field:
                              type: string
                            message:
                              type: string
                        nullable: true
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        example: req_abc123def456
          description: Validation Error
        '401':
          description: Authentication Required
        '403':
          description: Permission Denied
        '404':
          description: Not Found
  /v2/assignments/{id}/roles/:
    get:
      operationId: assignment_roles
      description: Derived Model의 부모 Target Model에 대한 역할 정보를 반환합니다.
      summary: 부모 Target Model 역할 조회

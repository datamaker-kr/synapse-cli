        SYNAPSE-Tenant: []
      - TokenAuth: []
        SYNAPSE-Tenant: []
      - AccessTokenAuth: []
        SYNAPSE-Tenant: []
      - SYNAPSE-Tenant: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                부모역할정보:
                  value:
                    parent_model: project
                    parent_id: 123
                    parent_name: My Project
                    roles:
                    - id: 1
                      name: leader
                      display_name: 리더
                      permissions:
                      - project.read
                      - project.write
                  summary: 부모 역할 정보
          description: 부모 역할 정보
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          properties:
                            field:
                              type: string
                            message:
                              type: string
                        nullable: true
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        example: req_abc123def456
          description: Validation Error
        '401':
          description: Authentication Required
        '403':
          description: Permission Denied
        '404':
          description: Not Found
  /v2/data-collections/:
    get:
      operationId: data_collection_list
      description: 테넌트 내 데이터 컬렉션 목록을 커서 기반 페이지네이션으로 조회합니다.
      summary: 데이터 컬렉션 목록 조회
      parameters:
      - in: query
        name: category
        schema:
          type: string
          x-spec-enum-id: 0bedee8f65ad78ce
          enum:
          - audio
          - data
          - image
          - pcd
          - text
          - video
        description: |-
          * `image` - Image
          * `video` - Video
          * `audio` - Audio
          * `text` - Text
          * `pcd` - PCD
          * `data` - Data
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: per_page
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Data Collections
      security:
      - tokenAuth: []
        SYNAPSE-Tenant: []
      - TokenAuth: []
        SYNAPSE-Tenant: []
      - AccessTokenAuth: []
        SYNAPSE-Tenant: []
      - SYNAPSE-Tenant: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDataCollectionV2ListList'
              examples:
                DataCollectionList:
                  value:
                    data:
                    - id: 1
                      name: Image Dataset
                      category: image
                      category_display: 이미지
                      access_level: PRIVATE
                      is_archived: false
                      created: '2026-01-15T09:00:00Z'
                      count_projects: 3
                    meta:
                      request_id: req_abc123def456
                      pagination:
                        next_cursor: cD0yMDI2LTAx
                        previous_cursor: null
                        per_page: 50
                  summary: DataCollection List
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                      details:
                        type: array
                        items:
                          type: object
                          properties:
                            field:
                              type: string
                            message:
                              type: string
                        nullable: true
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        example: req_abc123def456
          description: Validation Error
        '401':
          description: Authentication Required
        '403':
          description: Permission Denied
        '404':
          description: Not Found
    post:
      operationId: data_collection_create
      description: 데이터 컬렉션을 단일 요청으로 생성합니다. ?dry_run=true로 검증만 수행 가능.
      summary: 데이터 컬렉션 생성
      parameters:
      - in: query
        name: dry_run
        schema:
          type: boolean
        description: Validate request without executing. Returns validation result.
      tags:
      - Data Collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataCollectionV2CreateRequest'
            examples:
              CreateDataCollection:
                value:
                  name: New Image Dataset
                  description: Image dataset for labeling
                  category: image
                summary: Create DataCollection
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DataCollectionV2CreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DataCollectionV2CreateRequest'
        required: true
      security:
      - tokenAuth: []
        SYNAPSE-Tenant: []
      - TokenAuth: []
        SYNAPSE-Tenant: []
      - AccessTokenAuth: []
        SYNAPSE-Tenant: []
      - SYNAPSE-Tenant: []
      responses:
        '201':
          content:
            application/json:
              schema:
